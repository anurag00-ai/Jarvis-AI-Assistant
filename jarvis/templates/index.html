<!DOCTYPE html>
<html>

<head>

<title>Jarvis AI</title>

<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}


h1{

font-size:40px;

}


#chat{

width:70%;
height:400px;
margin:auto;
overflow-y:auto;
border:1px solid white;
padding:20px;
border-radius:15px;

}


.user{

text-align:right;
margin:15px;
color:#00ffff;

}


.jarvis{

text-align:left;
margin:15px;
color:#00ff66;

}


button{

padding:15px 30px;
font-size:20px;
border-radius:20px;
cursor:pointer;

}


</style>

</head>


<body>


<h1>🤖 JARVIS AI</h1>


<div id="chat">


<p class="jarvis">
Jarvis: Systems online. Welcome back Anurag.
</p>


</div>


<br>


<button onclick="startListening()">

🎙️ Speak

</button>



<script>


let recognition = new webkitSpeechRecognition();


recognition.continuous = false;

recognition.interimResults = false;

recognition.lang = "en-US";



function startListening(){

recognition.start();

}



recognition.onresult = function(event){


let command =
event.results[event.results.length-1][0].transcript;



addMessage("You: " + command,"user");



let text = command.toLowerCase();



if(text.includes("youtube")){


speak("Opening YouTube, Anurag");


window.open(
"https://youtube.com",
"_blank"
);


return;


}



else if(text.includes("google")){


speak("Opening Google, Anurag");


window.open(
"https://google.com",
"_blank"
);


return;


}



else if(text.includes("time")){


let time =
new Date().toLocaleTimeString();


speak(
"The current time is " + time
);


return;


}



else if(text.includes("date")){


let date =
new Date().toDateString();


speak(
"Today's date is " + date
);


return;


}



else if(text.includes("search")){


let query =
text.replace("search","").trim();



speak(
"Searching " + query
);



window.open(

"https://www.google.com/search?q="
+ encodeURIComponent(query),

"_blank"

);



return;


}


addMessage("Jarvis: Thinking...","jarvis");

fetch("/chat/",{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({


message:command


})


})



.then(response=>response.json())


.then(data=>{


addMessage(
"Jarvis: " + data.reply,
"jarvis"
);



speak(data.reply);



});



}




function addMessage(message,type){


let chat =
document.getElementById("chat");


let p =
document.createElement("p");


p.className = type;


p.innerHTML = message;


chat.appendChild(p);


chat.scrollTop =
chat.scrollHeight;


}

let selectedVoice = null;


function loadVoices(){

let voices = window.speechSynthesis.getVoices();


selectedVoice = voices.find(
voice => voice.name.includes("Zira")
);


if(!selectedVoice){

selectedVoice = voices.find(
voice => voice.name.includes("Google UK English Female")
);

}

}


speechSynthesis.onvoiceschanged = loadVoices;


function speak(message){


let speech = new SpeechSynthesisUtterance();


speech.text = message;


if(selectedVoice){

speech.voice = selectedVoice;

}


speech.rate = 1;

speech.pitch = 1.3;


window.speechSynthesis.speak(speech);


}





window.onload=function(){


speak(
"Welcome back Anurag. Systems are online. How can I assist you?"
);


}



</script>


</body>


</html>
