<!DOCTYPE html>
<html>
<head>
<title>Jarvis AI</title>
</head>

<body>

<h1>🤖 JARVIS</h1>

<p id="text">Click and speak</p>

<button onclick="startListening()">🎙️ Start Listening</button>

<script>

let recognition = new webkitSpeechRecognition();

recognition.continuous = true;
recognition.interimResults = false;
recognition.lang = "en-US";


function startListening(){

document.getElementById("text").innerHTML = "Listening...";

recognition.start();

}


recognition.onresult = function(event){

let command = event.results[event.results.length-1][0].transcript.toLowerCase();

document.getElementById("text").innerHTML = "You said: " + command;

fetch("/chat/", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify({

message: command

})

})

.then(response => response.json())

.then(data => {

speak(data.reply);

document.getElementById("text").innerHTML =
"Jarvis: " + data.reply;

});

}



function speak(message){

let speech = new SpeechSynthesisUtterance();

speech.text = message;

window.speechSynthesis.speak(speech);

}



recognition.onend = function(){

recognition.start();

}


</script>
</body>
</html>
